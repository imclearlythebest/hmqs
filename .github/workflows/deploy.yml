name: Build and Deploy to Azure

on:
  push:
    branches:
      - main  # Change this to your default branch name if it's different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.AZURE_REGISTRY_URL }}/hmqs-app:${{ github.sha }} .
          docker push ${{ secrets.AZURE_REGISTRY_URL }}/hmqs-app:${{ github.sha }}
          docker tag ${{ secrets.AZURE_REGISTRY_URL }}/hmqs-app:${{ github.sha }} ${{ secrets.AZURE_REGISTRY_URL }}/hmqs-app:latest
          docker push ${{ secrets.AZURE_REGISTRY_URL }}/hmqs-app:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'hmqs-app' # Replace with your actual Web App name
          images: '${{ secrets.AZURE_REGISTRY_URL }}/hmqs-app:latest'

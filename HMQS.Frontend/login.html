<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMQS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: "#1a1a1a",
                        matte: "#2a2a2a",
                        platinum: "#e5e4e2",
                        silver: "#c0c0c0",
                        accent: "#6c63ff"
                    },
                    fontFamily: { inter: ["Inter", "sans-serif"] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="bg-charcoal font-inter min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-6">

        <div class="text-center mb-10">
            <h1 class="text-platinum text-3xl font-semibold tracking-tight">HMQS</h1>
            <p class="text-silver text-sm mt-2">Help Me Quit Spotify</p>
        </div>

        <div class="bg-matte rounded-2xl p-8 shadow-2xl border border-white border-opacity-5">

            <h2 class="text-platinum text-xl font-medium mb-6">Sign in</h2>

            <div id="errorBox"
                class="hidden bg-red-900 bg-opacity-40 border border-red-500 border-opacity-40 text-red-300 text-sm rounded-lg px-4 py-3 mb-5">
                <span id="errorText"></span>
            </div>

            <form id="loginForm" class="space-y-4">

                <div>
                    <label class="text-silver text-sm block mb-1.5">Email</label>
                    <input type="email" id="email" placeholder="you@example.com"
                        class="w-full bg-charcoal text-platinum placeholder-gray-600 border border-white border-opacity-10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accent focus:border-opacity-60 transition" />
                </div>

                <div>
                    <label class="text-silver text-sm block mb-1.5">Password</label>
                    <input type="password" id="password" placeholder="Your password"
                        class="w-full bg-charcoal text-platinum placeholder-gray-600 border border-white border-opacity-10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accent focus:border-opacity-60 transition" />
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-accent text-white font-medium py-3 rounded-lg text-sm mt-2 hover:bg-opacity-90 active:scale-95 transition-all duration-150 disabled:opacity-50">
                    Sign In
                </button>

            </form>

            <p class="text-silver text-sm text-center mt-6">
                No account yet?
                <a href="register.html" class="text-accent hover:underline ml-1">Register</a>
            </p>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        redirectIfLoggedIn();

        const form = document.getElementById("loginForm");
        const errorBox = document.getElementById("errorBox");
        const errorText = document.getElementById("errorText");
        const submitBtn = document.getElementById("submitBtn");

        function showError(message) {
            errorText.textContent = message;
            errorBox.classList.remove("hidden");
        }

        function hideError() {
            errorBox.classList.add("hidden");
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            hideError();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                showError("All fields are required.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in...";

            try {
                const result = await loginUser({ email, password });

                saveTokens(result.accessToken, result.refreshToken);
                localStorage.setItem("username", result.username);
                localStorage.setItem("email", result.email);

                window.location.href = "dashboard.html";

            } catch (err) {
                showError(err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign In";
            }
        });
    </script>
</body>

</html>

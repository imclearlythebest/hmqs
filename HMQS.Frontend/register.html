<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMQS - Register</title>
    <!-- Tailwind CSS via CDN - no build step needed for now -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Extend Tailwind with our custom color palette
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: "#1a1a1a",
                        matte: "#2a2a2a",
                        platinum: "#e5e4e2",
                        silver: "#c0c0c0",
                        accent: "#6c63ff"
                    },
                    fontFamily: {
                        inter: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="bg-charcoal font-inter min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-6">

        <!-- Logo / Title -->
        <div class="text-center mb-10">
            <h1 class="text-platinum text-3xl font-semibold tracking-tight">HMQS</h1>
            <p class="text-silver text-sm mt-2">Help Me Quit Spotify</p>
        </div>

        <!-- Register Card -->
        <div class="bg-matte rounded-2xl p-8 shadow-2xl border border-white border-opacity-5">

            <h2 class="text-platinum text-xl font-medium mb-6">Create your account</h2>

            <!-- Error message box - hidden by default -->
            <div id="errorBox"
                class="hidden bg-red-900 bg-opacity-40 border border-red-500 border-opacity-40 text-red-300 text-sm rounded-lg px-4 py-3 mb-5">
                <span id="errorText"></span>
            </div>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-4">

                <div>
                    <label class="text-silver text-sm block mb-1.5">Username</label>
                    <input type="text" id="username" placeholder="yourname"
                        class="w-full bg-charcoal text-platinum placeholder-gray-600 border border-white border-opacity-10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accent focus:border-opacity-60 transition" />
                </div>

                <div>
                    <label class="text-silver text-sm block mb-1.5">Email</label>
                    <input type="email" id="email" placeholder="you@example.com"
                        class="w-full bg-charcoal text-platinum placeholder-gray-600 border border-white border-opacity-10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accent focus:border-opacity-60 transition" />
                </div>

                <div>
                    <label class="text-silver text-sm block mb-1.5">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters"
                        class="w-full bg-charcoal text-platinum placeholder-gray-600 border border-white border-opacity-10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-accent focus:border-opacity-60 transition" />
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-accent text-white font-medium py-3 rounded-lg text-sm mt-2 hover:bg-opacity-90 active:scale-95 transition-all duration-150 disabled:opacity-50">
                    Create Account
                </button>

            </form>

            <!-- Link to login -->
            <p class="text-silver text-sm text-center mt-6">
                Already have an account?
                <a href="login.html" class="text-accent hover:underline ml-1">Sign in</a>
            </p>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // If already logged in, skip this page
        redirectIfLoggedIn();

        const form = document.getElementById("registerForm");
        const errorBox = document.getElementById("errorBox");
        const errorText = document.getElementById("errorText");
        const submitBtn = document.getElementById("submitBtn");

        // Helper to show an error message on the form
        function showError(message) {
            errorText.textContent = message;
            errorBox.classList.remove("hidden");
        }

        // Helper to hide the error message
        function hideError() {
            errorBox.classList.add("hidden");
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault(); // Stop the form from reloading the page
            hideError();

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            // Basic client-side validation before hitting the API
            if (!username || !email || !password) {
                showError("All fields are required.");
                return;
            }

            if (password.length < 6) {
                showError("Password must be at least 6 characters.");
                return;
            }

            // Disable button while waiting for the API
            submitBtn.disabled = true;
            submitBtn.textContent = "Creating account...";

            try {
                const result = await registerUser({ username, email, password });

                // Save tokens and user info to localStorage
                saveTokens(result.accessToken, result.refreshToken);
                localStorage.setItem("username", result.username);
                localStorage.setItem("email", result.email);

                // Redirect to dashboard
                window.location.href = "dashboard.html";

            } catch (err) {
                showError(err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = "Create Account";
            }
        });
    </script>
</body>

</html>
